<!-- login.html - Login Page -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | LUMIÈRE</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Montserrat:wght@200;300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #D4AF37;
            --gold-light: #F4E8C1;
            --black: #0a0a0a;
            --charcoal: #1a1a1a;
            --graphite: #2a2a2a;
            --cream: #FAF9F6;
            --gray: #888;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Montserrat', sans-serif;
            background: var(--black);
            color: var(--cream);
            min-height: 100vh;
            display: flex;
        }

        .split-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            width: 100%;
            min-height: 100vh;
        }

        .image-side {
            background: linear-gradient(135deg, rgba(0,0,0,0.7), rgba(0,0,0,0.3)), 
                        radial-gradient(circle at 30% 30%, rgba(212,175,55,0.2), transparent 50%);
            background-color: var(--charcoal);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 3rem;
            position: relative;
            overflow: hidden;
        }

        .floating-gem {
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(212,175,55,0.3), transparent 70%);
            filter: blur(60px);
            animation: float 6s ease-in-out infinite;
        }

        .gem-1 { top: 10%; left: 10%; animation-delay: 0s; }
        .gem-2 { bottom: 20%; right: 10%; animation-delay: 3s; }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(30px, -30px) scale(1.1); }
        }

        .brand-content {
            text-align: center;
            z-index: 2;
        }

        .logo-large {
            font-family: 'Cormorant Garamond', serif;
            font-size: 4rem;
            color: var(--gold);
            letter-spacing: 0.3em;
            margin-bottom: 1rem;
        }

        .tagline {
            font-size: 1.2rem;
            color: var(--gray);
            font-style: italic;
            max-width: 400px;
            line-height: 1.6;
        }

        .form-side {
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 3rem 5rem;
            background: var(--black);
        }

        .form-container {
            max-width: 450px;
            width: 100%;
            margin: 0 auto;
        }

        .form-header {
            margin-bottom: 3rem;
        }

        .form-header h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.5rem;
            font-weight: 300;
            margin-bottom: 0.5rem;
        }

        .form-header p {
            color: var(--gray);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--gray);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        input {
            width: 100%;
            padding: 1rem 1.5rem;
            background: var(--charcoal);
            border: 1px solid rgba(212,175,55,0.2);
            color: var(--cream);
            font-family: 'Montserrat', sans-serif;
            font-size: 1rem;
            transition: all 0.3s ease;
            border-radius: 4px;
        }

        input:focus {
            outline: none;
            border-color: var(--gold);
            background: var(--graphite);
        }

        .password-field {
            position: relative;
        }

        .toggle-password {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--gray);
            cursor: pointer;
            font-size: 1.2rem;
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--gray);
            cursor: pointer;
        }

        .remember-me input {
            width: auto;
            accent-color: var(--gold);
        }

        .forgot-link {
            color: var(--gold);
            text-decoration: none;
            transition: opacity 0.3s ease;
        }

        .forgot-link:hover {
            opacity: 0.7;
        }

        .btn {
            width: 100%;
            padding: 1.2rem;
            background: var(--gold);
            color: var(--black);
            border: none;
            font-family: 'Montserrat', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            border-radius: 4px;
            margin-bottom: 1.5rem;
        }

        .btn:hover {
            background: var(--gold-light);
            transform: translateY(-2px);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
        }

        .btn-outline:hover {
            background: var(--gold);
            color: var(--black);
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 2rem 0;
            color: var(--gray);
            font-size: 0.9rem;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(212,175,55,0.2);
        }

        .divider span {
            padding: 0 1rem;
        }

        .social-login {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .social-btn {
            flex: 1;
            padding: 1rem;
            background: var(--charcoal);
            border: 1px solid rgba(212,175,55,0.2);
            color: var(--cream);
            font-family: 'Montserrat', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .social-btn:hover {
            border-color: var(--gold);
            background: rgba(212,175,55,0.05);
        }

        .signup-link {
            text-align: center;
            color: var(--gray);
        }

        .signup-link a {
            color: var(--gold);
            text-decoration: none;
            font-weight: 500;
        }

        .back-link {
            position: absolute;
            top: 2rem;
            left: 2rem;
            color: var(--gray);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: color 0.3s ease;
        }

        .back-link:hover {
            color: var(--gold);
        }

        @media (max-width: 968px) {
            .split-container {
                grid-template-columns: 1fr;
            }
            .image-side {
                display: none;
            }
            .form-side {
                padding: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="split-container">
        <div class="image-side">
            <div class="floating-gem gem-1"></div>
            <div class="floating-gem gem-2"></div>
            <div class="brand-content">
                <h1 class="logo-large">LUMIÈRE</h1>
                <p class="tagline">"Jewelry takes people's minds off your wrinkles."</p>
                <p style="color: var(--gold); margin-top: 1rem;">— Sonja Henie</p>
            </div>
        </div>
        
        <div class="form-side">
            <a href="index.html" class="back-link">← Back to Home</a>
            
            <div class="form-container">
                <div class="form-header">
                    <h1>Welcome Back</h1>
                    <p>Sign in to access your exclusive collection</p>
                </div>

                <form id="loginForm" onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" placeholder="elena@example.com" required>
                    </div>

                    <div class="form-group">
                        <label>Password</label>
                        <div class="password-field">
                            <input type="password" id="password" placeholder="••••••••" required>
                            <button type="button" class="toggle-password" onclick="togglePassword()">👁</button>
                        </div>
                    </div>

                    <div class="form-options">
                        <label class="remember-me">
                            <input type="checkbox">
                            <span>Remember me</span>
                        </label>
                        <a href="#" class="forgot-link">Forgot password?</a>
                    </div>

                    <button type="submit" class="btn">Sign In</button>
                </form>

                <div class="divider">
                    <span>or continue with</span>
                </div>

                <div class="social-login">
                    <button class="social-btn">G Google</button>
                    <button class="social-btn">f Facebook</button>
                </div>

                <p class="signup-link">
                    Don't have an account? <a href="signup.html">Create one</a>
                </p>
            </div>
        </div>
    </div>

    <script>
        function togglePassword() {
            const password = document.getElementById('password');
            password.type = password.type === 'password' ? 'text' : 'password';
        }

        function handleLogin(e) {
            e.preventDefault();
            const btn = e.target.querySelector('.btn');
            btn.textContent = 'Signing in...';
            
            setTimeout(() => {
                window.location.href = 'dashboard.html';
            }, 1500);
        }
    </script>
</body>
</html>
